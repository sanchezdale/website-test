name: Security

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: '17 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependency-vulnerability-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run OSV-Scanner
        run: |
          set +e
          docker run --rm             -v "${{ github.workspace }}:/workspace"             ghcr.io/google/osv-scanner:v2.3.8             --recursive             /workspace
          status=$?
          set -e
          if [ "$status" -eq 128 ]; then
            echo "OSV-Scanner found no supported package sources to scan."
            exit 0
          fi
          exit "$status"

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run gitleaks
        uses: docker://zricethezav/gitleaks:v8.28.0
        with:
          args: detect --source=/github/workspace --no-git --redact --verbose --no-banner

  trufflehog-secret-scan:
    name: TruffleHog verified secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab
        with:
          path: ./
          extra_args: --results=verified

  workflow-security:
    name: GitHub Actions workflow audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Run zizmor
        uses: zizmorcore/zizmor-action@b572f7b1a1c2d41efaab43d504f68d215c3cd727
        with:
          advanced-security: false
          annotations: true
          min-severity: medium
          min-confidence: medium
